version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: infrareport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  service-core:
    build:
      context: ./service-core
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: infrareport
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./service-core/src:/app/src
      - ./client-admin/app/admin:/app/public/admin
      - shared-uploads:/app/uploads
      - /app/node_modules
    networks:
      - srms-network
      - default

  client-mobile:
    build:
      context: ./client-mobile
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      EXPO_DEVTOOLS_LISTEN_ADDRESS: 0.0.0.0
      EXPO_PUBLIC_API_BASE_URL: http://${HOST_IP}:3000/api
      REACT_NATIVE_PACKAGER_HOSTNAME: ${HOST_IP}
    stdin_open: true
    tty: true
    depends_on:
      - service-core
    volumes:
      - ./client-mobile:/app
      - /app/node_modules

volumes:
  pgdata:
  shared-uploads:
    external: true

networks:
  srms-network:
    external: true