<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABB Altyapı Yönetim Paneli</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #005baa;
        --primary-dark: #003f7a;
        --primary-light: #e8f0fe;
        --bg: #f2f4f7;
        --white: #ffffff;
        --text: #1a1a2e;
        --text-secondary: #5a6278;
        --text-tertiary: #8e95a8;
        --border: #dde1e9;
        --success: #0d9e4f;
        --success-bg: #e6f7ed;
        --warning: #e8a317;
        --warning-bg: #fff8e6;
        --danger: #d32f2f;
        --danger-bg: #fdeded;
        --info: #0288d1;
        --info-bg: #e3f2fd;
        --critical: #d32f2f;
        --high: #e8651a;
        --medium: #e8a317;
        --low: #0d9e4f;
        --shadow: rgba(0, 43, 91, 0.08);
        --radius: 12px;
      }

      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* TOP BAR */
      .topbar {
        background: var(--primary-dark);
        padding: 0 32px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .topbar-logo {
        background: white;
        color: var(--primary-dark);
        font-weight: 900;
        font-size: 15px;
        letter-spacing: 2px;
        padding: 4px 10px;
        border-radius: 6px;
      }

      .topbar-divider {
        width: 1px;
        height: 24px;
        background: rgba(255, 255, 255, 0.25);
      }

      .topbar-title {
        color: rgba(255, 255, 255, 0.85);
        font-size: 14px;
        font-weight: 500;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .user-menu {
        position: relative;
      }
      .user-menu-btn {
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(255,255,255,0.15);
        color: white;
        border: 1px solid rgba(255,255,255,0.3);
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.2s;
      }
      .user-menu-btn:hover { background: rgba(255,255,255,0.25); }
      .user-menu-arrow { font-size: 10px; opacity: 0.8; }
      .user-dropdown {
        position: absolute;
        top: calc(100% + 6px);
        right: 0;
        background: white;
        border-radius: 10px;
        box-shadow: 0 8px 32px rgba(0,43,91,0.18);
        min-width: 100%;
        overflow: hidden;
        display: none;
        z-index: 1000;
        border: 1px solid #eef0f4;
      }
      .user-dropdown.open { display: block; animation: dropIn 0.15s ease; }
      @keyframes dropIn {
        from { opacity: 0; transform: translateY(-6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      .user-dropdown-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 600;
        color: #d32f2f;
        cursor: pointer;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .user-dropdown-item:hover { background: #fdeded; }

      .topbar-badge {
        background: var(--danger);
        color: white;
        font-size: 11px;
        font-weight: 700;
        padding: 2px 8px;
        border-radius: 12px;
      }

      /* NAV TABS */
      .nav-tabs {
        background: white;
        border-bottom: 1px solid var(--border);
        padding: 0 32px;
        display: flex;
        gap: 0;
      }

      .nav-tab {
        padding: 14px 20px;
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        user-select: none;
      }

      .nav-tab:hover {
        color: var(--primary);
      }

      .nav-tab.active {
        color: var(--primary);
        border-bottom-color: var(--primary);
      }

      /* MAIN CONTENT */
      .main {
        padding: 24px 32px;
        max-width: 1400px;
        margin: 0 auto;
      }

      /* STATS GRID */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }

      .stat-card {
        background: white;
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: 0 1px 4px var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .stat-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 4px;
        height: 100%;
      }

      .stat-card.total::before {
        background: var(--primary);
      }
      .stat-card.pending::before {
        background: var(--warning);
      }
      .stat-card.reviewing::before {
        background: var(--info);
      }
      .stat-card.resolved::before {
        background: var(--success);
      }
      .stat-card.critical::before {
        background: var(--critical);
      }

      .stat-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .stat-number {
        font-size: 32px;
        font-weight: 800;
      }

      .stat-card.total .stat-number {
        color: var(--primary);
      }
      .stat-card.pending .stat-number {
        color: var(--warning);
      }
      .stat-card.reviewing .stat-number {
        color: var(--info);
      }
      .stat-card.resolved .stat-number {
        color: var(--success);
      }
      .stat-card.critical .stat-number {
        color: var(--critical);
      }

      /* FILTERS */
      .filters-bar {
        background: white;
        border-radius: var(--radius);
        padding: 16px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 16px;
        box-shadow: 0 1px 4px var(--shadow);
        flex-wrap: wrap;
      }

      .filter-label {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-secondary);
        margin-right: 4px;
      }

      .filter-select {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        color: var(--text);
        background: var(--bg);
        cursor: pointer;
        outline: none;
      }

      .filter-select:focus {
        border-color: var(--primary);
      }

      .filter-search {
        flex: 1;
        min-width: 200px;
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 13px;
        font-family: inherit;
        outline: none;
        background: var(--bg);
      }

      .filter-search:focus {
        border-color: var(--primary);
      }

      /* TABLE */
      .table-container {
        background: white;
        border-radius: var(--radius);
        box-shadow: 0 1px 4px var(--shadow);
        overflow: hidden;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead {
        background: #f7f8fa;
      }

      th {
        text-align: left;
        padding: 12px 16px;
        font-size: 11px;
        font-weight: 700;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border);
      }

      td {
        padding: 14px 16px;
        font-size: 13px;
        border-bottom: 1px solid #f0f1f3;
        vertical-align: middle;
      }

      tr:hover {
        background: #fafbfc;
      }

      .report-image {
        width: 56px;
        height: 40px;
        border-radius: 6px;
        object-fit: cover;
      }

      .report-desc {
        max-width: 250px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--text);
      }

      .report-address {
        font-size: 11px;
        color: var(--text-tertiary);
        margin-top: 2px;
      }

      /* BADGES */
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 11px;
        font-weight: 700;
      }

      .badge-beklemede {
        background: var(--warning-bg);
        color: var(--warning);
      }
      .badge-inceleniyor {
        background: var(--info-bg);
        color: var(--info);
      }
      .badge-cozuldu {
        background: var(--success-bg);
        color: var(--success);
      }
      .badge-reddedildi {
        background: var(--danger-bg);
        color: var(--danger);
      }

      .badge-kritik {
        background: var(--danger-bg);
        color: var(--critical);
      }
      .badge-yuksek {
        background: #fff0e6;
        color: var(--high);
      }
      .badge-orta {
        background: var(--warning-bg);
        color: var(--medium);
      }
      .badge-dusuk {
        background: var(--success-bg);
        color: var(--low);
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        display: inline-block;
      }

      /* ACTION BUTTONS */
      .btn {
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.15s;
      }

      .btn-status {
        background: var(--primary-light);
        color: var(--primary);
        border-color: transparent;
      }
      .btn-status:hover {
        background: var(--primary);
        color: white;
      }


      .btn-delete {
        background: var(--danger-bg);
        color: var(--danger);
      }
      .btn-delete:hover {
        background: var(--danger);
        color: white;
      }

      .actions-cell {
        display: flex;
        gap: 6px;
      }

      /* STATUS SELECT */
      .status-select {
        padding: 4px 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        font-family: inherit;
        border: 1px solid var(--border);
        cursor: pointer;
        outline: none;
      }

      /* MODAL */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2000;
        animation: fadeIn 0.15s;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .modal {
        background: white;
        border-radius: 16px;
        width: 520px;
        max-width: 90vw;
        max-height: 85vh;
        overflow-y: auto;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        animation: slideUp 0.2s;
      }

      @keyframes slideUp {
        from {
          transform: translateY(20px);
          opacity: 0;
        }
        to {
          transform: translateY(0);
          opacity: 1;
        }
      }

      .modal-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .modal-title {
        font-size: 17px;
        font-weight: 700;
      }

      .modal-close {
        width: 32px;
        height: 32px;
        border-radius: 8px;
        border: none;
        background: var(--bg);
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-secondary);
      }

      .modal-close:hover {
        background: var(--border);
      }

      .modal-body {
        padding: 24px;
      }

      .modal-image {
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 16px;
      }

      .modal-info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
      }

      .modal-info-item {
        background: var(--bg);
        padding: 12px;
        border-radius: 8px;
      }

      .modal-info-label {
        font-size: 11px;
        font-weight: 700;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 4px;
      }

      .modal-info-value {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
      }

      .modal-desc {
        font-size: 14px;
        line-height: 1.6;
        color: var(--text);
        margin-bottom: 20px;
        padding: 14px;
        background: var(--bg);
        border-radius: 8px;
      }

      .modal-section-title {
        font-size: 12px;
        font-weight: 700;
        color: var(--text-tertiary);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
      }

      .modal-status-select {
        width: 100%;
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        font-weight: 600;
        cursor: pointer;
        outline: none;
        margin-bottom: 16px;
      }

      .modal-textarea {
        width: 100%;
        min-height: 100px;
        padding: 12px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-family: inherit;
        resize: vertical;
        outline: none;
        margin-bottom: 16px;
      }

      .modal-textarea:focus,
      .modal-status-select:focus {
        border-color: var(--primary);
      }

      .modal-footer {
        padding: 16px 24px;
        border-top: 1px solid var(--border);
        display: flex;
        justify-content: flex-end;
        gap: 8px;
      }

      .btn-save {
        background: var(--primary);
        color: white;
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
      }
      .btn-save:hover {
        background: var(--primary-dark);
      }

      .btn-cancel {
        background: var(--bg);
        color: var(--text-secondary);
        padding: 10px 24px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
      }
      .btn-cancel:hover {
        background: var(--border);
      }

      /* DELETE CONFIRM */
      .delete-confirm {
        text-align: center;
        padding: 20px 0;
      }

      .delete-icon {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--danger-bg);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 16px;
        font-size: 28px;
      }

      .delete-text {
        font-size: 15px;
        color: var(--text-secondary);
        margin-bottom: 8px;
      }

      .btn-delete-confirm {
        background: var(--danger);
        color: white;
        padding: 10px 24px;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
      }
      .btn-delete-confirm:hover {
        opacity: 0.9;
      }

      /* MAP CONTAINER */
      .map-wrapper {
        background: white;
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: 0 1px 4px var(--shadow);
        height: calc(100vh - 200px);
      }

      #admin-map {
        width: 100%;
        height: 100%;
      }

      /* RESOLUTION NOTE DISPLAY */
      .resolution-note {
        background: var(--success-bg);
        padding: 8px 12px;
        border-radius: 6px;
        font-size: 12px;
        color: var(--success);
        font-weight: 500;
        margin-top: 4px;
        border-left: 3px solid var(--success);
      }

      /* TIME */
      .time-cell {
        font-size: 12px;
        color: var(--text-tertiary);
      }

      /* EMPTY */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: var(--text-tertiary);
      }

      .empty-state svg {
        width: 64px;
        height: 64px;
        margin-bottom: 16px;
        opacity: 0.4;
      }

      /* RESPONSIVE */
      @media (max-width: 1100px) {
        .stats-grid {
          grid-template-columns: repeat(3, 1fr);
        }
      }

      @media (max-width: 768px) {
        .main {
          padding: 16px;
        }
        .stats-grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .topbar {
          padding: 0 16px;
        }
        .nav-tabs {
          padding: 0 16px;
          overflow-x: auto;
        }
        .filters-bar {
          flex-direction: column;
          align-items: stretch;
        }
        .modal {
          width: 95vw;
        }
      }

      /* ===== LOGIN SCREEN ===== */
      #login-screen {
        min-height: 100vh;
        background: linear-gradient(135deg, #003f7a 0%, #005baa 100%);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-card {
        background: #fff;
        border-radius: 20px;
        padding: 48px 40px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      }
      .login-logo {
        text-align: center;
        margin-bottom: 32px;
      }
      .login-logo-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 64px;
        height: 64px;
        border-radius: 16px;
        background: #005baa;
        color: #fff;
        font-size: 22px;
        font-weight: 800;
        margin-bottom: 12px;
      }
      .login-logo h1 {
        font-size: 20px;
        font-weight: 700;
        color: #1a1a2e;
        margin-bottom: 4px;
      }
      .login-logo p {
        font-size: 13px;
        color: #8e95a8;
      }
      .login-field {
        margin-bottom: 16px;
      }
      .login-field label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #5a6278;
        margin-bottom: 6px;
      }
      .login-field input {
        width: 100%;
        padding: 12px 14px;
        border: 1.5px solid #dde1e9;
        border-radius: 10px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.2s;
      }
      .login-field input:focus {
        border-color: #005baa;
      }
      .login-btn {
        width: 100%;
        padding: 13px;
        background: #005baa;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        margin-top: 8px;
        transition: background 0.2s;
      }
      .login-btn:hover { background: #003f7a; }
      .login-btn:disabled { background: #8e95a8; cursor: not-allowed; }
      .login-error {
        background: #fdeded;
        color: #d32f2f;
        border-radius: 8px;
        padding: 10px 14px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="login-screen">
      <div class="login-card">
        <div class="login-logo">
          <div class="login-logo-badge">ABB</div>
          <h1>Yönetim Paneli</h1>
          <p>Altyapı Bildirim Sistemi</p>
        </div>
        <div class="login-error" id="login-error"></div>
        <div class="login-field">
          <label>E-posta</label>
          <input type="email" id="login-email" placeholder="admin@ankara.bel.tr" />
        </div>
        <div class="login-field">
          <label>Şifre</label>
          <input type="password" id="login-password" placeholder="••••••••" />
        </div>
        <button class="login-btn" id="login-btn" onclick="handleLogin()">Giriş Yap</button>
      </div>
    </div>
    <div id="app" style="display:none"></div>

    <script>

      // ==================== API ====================
      const API_BASE = '/api';

      async function handleLogin() {
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');
        const errEl = document.getElementById('login-error');

        if (!email || !password) {
          errEl.textContent = 'E-posta ve şifre gerekli.';
          errEl.style.display = 'block';
          return;
        }

        btn.disabled = true;
        btn.textContent = 'Giriş yapılıyor...';
        errEl.style.display = 'none';

        try {
          const res = await fetch(`${API_BASE}/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password }),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.message || 'Giriş başarısız');
          if (data.user.role !== 'admin' && data.user.role !== 'department') {
            throw new Error('Bu panele erişim yetkiniz yok.');
          }
          localStorage.setItem('srms_token', data.token);
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('app').style.display = 'block';
          loadReports();
        } catch (err) {
          errEl.textContent = err.message;
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Giriş Yap';
        }
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
          handleLogin();
        }
      });

      function toggleUserMenu() {
        const dropdown = document.getElementById('user-dropdown');
        if (dropdown) dropdown.classList.toggle('open');
      }

      document.addEventListener('click', (e) => {
        const menu = document.getElementById('user-menu');
        if (menu && !menu.contains(e.target)) {
          const dropdown = document.getElementById('user-dropdown');
          if (dropdown) dropdown.classList.remove('open');
        }
      });

      function handleLogout() {
        localStorage.removeItem('srms_token');
        document.getElementById('app').style.display = 'none';
        document.getElementById('login-screen').style.display = 'flex';
      }

      function getToken() {
        return localStorage.getItem('srms_token') || '';
      }

      async function apiFetch(path, options = {}) {
        const res = await fetch(`${API_BASE}${path}`, {
          ...options,
          headers: {
            'Authorization': `Bearer ${getToken()}`,
            'Content-Type': 'application/json',
            ...(options.headers || {}),
          },
        });
        if (res.status === 401) {
          localStorage.removeItem('srms_token');
          document.getElementById('app').style.display = 'none';
          document.getElementById('login-screen').style.display = 'flex';
          return null;
        }
        return res.json();
      }

      const STATUS_TO_UI = {
        pending: 'beklemede',
        approved: 'cozuldu',
        rejected: 'reddedildi',
        redirected: 'inceleniyor',
      };

      const UI_TO_API_STATUS = {
        beklemede: null,
        inceleniyor: 'redirected',
        cozuldu: 'approved',
      };

      const CATEGORY_MAP = {
        road_damage: 'yol',
        sidewalk_damage: 'yol',
        infrastructure: 'yol',
        traffic_sign: 'yol',
        sewage_water: 'su',
        waste: 'cop',
        pollution: 'cop',
        green_space: 'park',
        lighting: 'elektrik',
        vandalism: 'diger',
        stray_animal: 'diger',
        natural_disaster: 'diger',
        normal: 'diger',
        irrelevant: 'diger',
      };

      function mapPriority(priority) {
        if (!priority) return 'dusuk';
        const p = priority.toLowerCase();
        if (p.includes('critical') || p.includes('5')) return 'kritik';
        if (p.includes('high') || p.includes('4')) return 'yuksek';
        if (p.includes('medium') || p.includes('3')) return 'orta';
        return 'dusuk';
      }

      function mapReport(r) {
        const filename = r.imagePath ? r.imagePath.split('/').pop() : null;
        return {
          id: r.id,
          image: filename ? `${API_BASE}/reports/images/${filename}` : null,
          description: r.aiDescription || '',
          userDescription: r.description || '',
          category: CATEGORY_MAP[r.aiCategory] || 'diger',
          categoryLabel: r.aiUnit || r.aiCategory || 'Diğer',
          latitude: r.latitude || 0,
          longitude: r.longitude || 0,
          address: r.aiUnit || '',
          timestamp: new Date(r.createdAt).getTime(),
          status: STATUS_TO_UI[r.status] || 'beklemede',
          criticality: mapPriority(r.aiPriority),
          resolution: r.staffNote || '',
        };
      }

      async function loadReports() {
        try {
          const data = await apiFetch('/reports');
          if (data) state.reports = data.map(mapReport);
        } catch (err) {
          console.error('Raporlar yüklenemedi:', err);
        }
        render();
      }


      


      // ==================== STATE ====================
      let state = {
        reports: [],
        activeTab: "dashboard",
        filterStatus: "all",
        filterCategory: "all",
        filterCriticality: "all",
        searchQuery: "",
        selectedReport: null,
        showDetailModal: false,
        showDeleteModal: false,
        deleteTargetId: null,
        mapInstance: null,
      };

      // ==================== HELPERS ====================
      function getTimeAgo(ts) {
        const seconds = Math.floor((Date.now() - ts) / 1000);
        if (seconds < 60) return "Az önce";
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes} dk önce`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours} saat önce`;
        const days = Math.floor(hours / 24);
        return `${days} gün önce`;
      }

      function getStatusLabel(s) {
        return (
          {
            beklemede: "Beklemede",
            inceleniyor: "İnceleniyor",
            cozuldu: "Çözüldü",
            reddedildi: "Reddedildi",
          }[s] || s
        );
      }

      function getCriticalityLabel(c) {
        return (
          { kritik: "Kritik", yuksek: "Yüksek", orta: "Orta", dusuk: "Düşük" }[
            c
          ] || c
        );
      }

      function getFilteredReports() {
        return state.reports.filter((r) => {
          if (state.filterStatus !== "all" && r.status !== state.filterStatus)
            return false;
          if (
            state.filterCategory !== "all" &&
            r.category !== state.filterCategory
          )
            return false;
          if (
            state.filterCriticality !== "all" &&
            r.criticality !== state.filterCriticality
          )
            return false;
          if (state.searchQuery) {
            const q = state.searchQuery.toLowerCase();
            return (
              r.description.toLowerCase().includes(q) ||
              r.address.toLowerCase().includes(q) ||
              r.categoryLabel.toLowerCase().includes(q)
            );
          }
          return true;
        });
      }

      // ==================== RENDER ====================
      function render() {
        const app = document.getElementById("app");
        app.innerHTML = `
    ${renderTopbar()}
    ${renderNavTabs()}
    <div class="main">
      ${state.activeTab === "dashboard" ? renderDashboard() : ""}
      ${state.activeTab === "reports" ? renderReports() : ""}
      ${state.activeTab === "map" ? renderMap() : ""}
    </div>
    ${state.showDetailModal ? renderDetailModal() : ""}
    ${state.showDeleteModal ? renderDeleteModal() : ""}
  `;
        bindEvents();
        if (state.activeTab === "map") initMap();
      }

        </div>

    </div>
  `;

        <div class="table-container">

              <tr>
                <th>Fotoğraf</th>
                <th>Açıklama</th>
                <th>Kategori</th>
                <th>Durum</th>
                <th>Aciliyet</th>
                <th>Zaman</th>
              </tr>
            </thead>
            <tbody>
              ${recentReports

        <div style="background:white;border-radius:var(--radius);padding:20px;box-shadow:0 1px 4px var(--shadow);">

                </div>

  `;
      }

                  </div>

              </tr>
            `,

              .join("")}
          </tbody>
        </table>
      `
      }
    </div>
  `;
      }

      function renderDetailModal() {

      // ==================== MAP ====================
      function initMap() {
        setTimeout(() => {
          const mapEl = document.getElementById("admin-map");
          if (!mapEl) return;

          const catColors = {
            yol: "#E8651A",
            su: "#0288D1",
            elektrik: "#E8A317",
            bina: "#7B1FA2",
            park: "#0D9E4F",
            cop: "#5D4037",
            gaz: "#D32F2F",
            diger: "#8E95A8",
          };

          const critColors = {
            kritik: "#D32F2F",
            yuksek: "#E8651A",
            orta: "#E8A317",
            dusuk: "#0D9E4F",
          };

          const map = L.map("admin-map").setView([39.9334, 32.8597], 12);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
            attribution: "© OpenStreetMap",
          }).addTo(map);

          const clusterGroup = L.markerClusterGroup();

          state.reports.forEach((r) => {
            if (!r.latitude && !r.longitude) return;
            const color = catColors[r.category] || "#8E95A8";
            const critColor = critColors[r.criticality] || "#8E95A8";
            const icon = L.divIcon({
              html: `<div style="width:18px;height:18px;border-radius:50%;background:${color};border:3px solid white;box-shadow:0 2px 6px rgba(0,0,0,0.3);"></div>`,
              iconSize: [18, 18],
              className: "",
            });

            clusterGroup.addLayer(L.marker([r.latitude, r.longitude], { icon }).bindPopup(`
          <div style="font-family:'Plus Jakarta Sans',sans-serif;min-width:200px;">
            <img src="${r.image}" style="width:100%;height:80px;object-fit:cover;border-radius:6px;margin-bottom:8px;" onerror="this.style.display='none'">
            <div style="font-weight:700;color:#005BAA;font-size:12px;text-transform:uppercase;margin-bottom:4px;">${r.categoryLabel}</div>
            <div style="font-size:13px;margin-bottom:6px;">${r.description.substring(0, 80)}...</div>
            <div style="font-size:11px;color:#8E95A8;">📍 ${r.address}</div>
            <div style="margin-top:6px;display:flex;gap:4px;">
              <span style="background:${r.status === "beklemede" ? "#FFF8E6" : r.status === "inceleniyor" ? "#E3F2FD" : r.status === "reddedildi" ? "#FDEDED" : "#E6F7ED"};color:${r.status === "beklemede" ? "#E8A317" : r.status === "inceleniyor" ? "#0288D1" : r.status === "reddedildi" ? "#D32F2F" : "#0D9E4F"};padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">${getStatusLabel(r.status)}</span>
              <span style="background:${critColor}20;color:${critColor};padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;">${getCriticalityLabel(r.criticality)}</span>
            </div>
          </div>
        `));
          });

          map.addLayer(clusterGroup);
          state.mapInstance = map;
        }, 100);
      }

      // ==================== EVENT BINDING ====================
      function bindEvents() {
        // Nav tabs
        document.querySelectorAll(".nav-tab").forEach((tab) => {
          tab.addEventListener("click", () => {
            state.activeTab = tab.dataset.tab;
            render();
          });
        });

        // Filters
        const filterStatus = document.getElementById("filter-status");
        if (filterStatus) {
          filterStatus.addEventListener("change", (e) => {
            state.filterStatus = e.target.value;
            render();
          });
        }

        const filterCategory = document.getElementById("filter-category");
        if (filterCategory) {
          filterCategory.addEventListener("change", (e) => {
            state.filterCategory = e.target.value;
            render();
          });
        }

        const filterCriticality = document.getElementById("filter-criticality");
        if (filterCriticality) {
          filterCriticality.addEventListener("change", (e) => {
            state.filterCriticality = e.target.value;
            render();
          });
        }

        const filterSearch = document.getElementById("filter-search");
        if (filterSearch) {
          filterSearch.addEventListener("input", (e) => {
            state.searchQuery = e.target.value;
            render();
            // Re-focus search after render
            const newSearch = document.getElementById("filter-search");
            if (newSearch) {
              newSearch.focus();
              newSearch.selectionStart = newSearch.selectionEnd =
                newSearch.value.length;
            }
          });
        }

        // View detail buttons
        document.querySelectorAll("[data-view]").forEach((btn) => {
          btn.addEventListener("click", () => {
            const report = state.reports.find((r) => r.id === btn.dataset.view);
            if (report) {
              state.selectedReport = { ...report };
              state.showDetailModal = true;
              render();
            }
          });
        });

        // Delete buttons
        document.querySelectorAll("[data-delete]").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            state.deleteTargetId = btn.dataset.delete;
            state.showDeleteModal = true;
            render();
          });
        });

        // Modal events
        const modalClose = document.getElementById("modal-close");
        const modalCancel = document.getElementById("modal-cancel-btn");
        const modalSave = document.getElementById("modal-save-btn");
        const modalOverlay = document.getElementById("modal-overlay");

        if (modalClose) modalClose.addEventListener("click", closeDetailModal);
        if (modalCancel)
          modalCancel.addEventListener("click", closeDetailModal);
        if (modalOverlay)
          modalOverlay.addEventListener("click", (e) => {
            if (e.target === modalOverlay) closeDetailModal();
          });

        if (modalSave) {
          modalSave.addEventListener("click", async () => {
            const newStatus = document.getElementById("modal-status").value;
            const newResolution =
              document.getElementById("modal-resolution").value;

            const apiStatus = UI_TO_API_STATUS[newStatus];
            if (apiStatus) {
              await apiFetch(`/reports/${state.selectedReport.id}/review`, {
                method: 'PATCH',
                body: JSON.stringify({ status: apiStatus, staffNote: newResolution }),
              });
            }

            const idx = state.reports.findIndex(
              (r) => r.id === state.selectedReport.id,
            );
            if (idx !== -1) {
              state.reports[idx].status = newStatus;
              state.reports[idx].resolution = newResolution;
            }
            closeDetailModal();
          });
        }

        // Delete modal events
        const deleteClose = document.getElementById("delete-close");
        const deleteCancel = document.getElementById("delete-cancel-btn");
        const deleteConfirm = document.getElementById("delete-confirm-btn");
        const deleteOverlay = document.getElementById("delete-overlay");

        if (deleteClose)
          deleteClose.addEventListener("click", closeDeleteModal);
        if (deleteCancel)
          deleteCancel.addEventListener("click", closeDeleteModal);
        if (deleteOverlay)
          deleteOverlay.addEventListener("click", (e) => {
            if (e.target === deleteOverlay) closeDeleteModal();
          });

        if (deleteConfirm) {
          deleteConfirm.addEventListener("click", async () => {
            const idToDelete = state.deleteTargetId;
            try {
              await apiFetch(`/reports/${idToDelete}`, { method: 'DELETE' });
              state.reports = state.reports.filter((r) => r.id !== idToDelete);
            } catch (err) {
              alert('Rapor silinirken bir hata oluştu.');
              console.error(err);
            }
            closeDeleteModal();
          });
        }
      }

      function closeDetailModal() {
        state.showDetailModal = false;
        state.selectedReport = null;
        render();
      }

      function closeDeleteModal() {
        state.showDeleteModal = false;
        state.deleteTargetId = null;
        render();
      }

      // ==================== INIT ====================
      // If already logged in, skip login screen
      if (localStorage.getItem('srms_token')) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadReports();
      }
    </script>
  </body>
</html>
